# Deploy Node CSI driver on all non-control-plane nodes.
# Using nodeAffinity instead of nodeSelector so we don't depend on a custom
# label being applied to workers — control-plane nodes always have
# node-role.kubernetes.io/control-plane set by Kubernetes itself.
node:
  nodeSelector: {}
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: DoesNotExist
  tolerations:
    - operator: Exists

# Deploy CSI controller only on control-plane nodes
nodeSelector:
  node-role.kubernetes.io/control-plane: ""
tolerations:
  - key: node-role.kubernetes.io/control-plane
    effect: NoSchedule

storageClass:
- name: premium-nvme
  storage: nvme # Storage name at proxmox
  reclaimPolicy: Delete
  fstype: xfs
- name: standard-ssd
  storage: ssd # Storage name at proxmox
  reclaimPolicy: Delete
  fstype: xfs
- name: cold-hdd
  storage: data # Storage name at proxmox
  reclaimPolicy: Delete
  fstype: xfs
